{% load static %}
<div id="modal-mpu" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-fade-in-up">
        <form hx-post="{% url 'sistema_justica:cadastro_mpu' %}" hx-target="#modal-mpu" hx-swap="outerHTML" class="p-6">
            {% csrf_token %}
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-purple-700 flex items-center gap-2">
                    <i class="fas fa-shield-alt"></i> Cadastrar Medida Protetiva
                </h2>
                <button type="button" class="text-gray-400 hover:text-gray-700 text-2xl font-bold leading-none"
                    onclick="document.getElementById('modal-mpu').remove()">&times;</button>
            </div>
            <div class="mb-4">
                {{ form.as_p }}
            </div>
            <div class="flex justify-end gap-2">
                <button type="button"
                    class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition"
                    onclick="document.getElementById('modal-mpu').remove()">Cancelar</button>
                <button type="submit"
                    class="px-4 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition">
                    Salvar
                </button>
            </div>
            {% if form.errors %}
            <div class="mt-4 text-red-600 text-sm">
                {{ form.errors }}
            </div>
            {% endif %}
            {% if mensagem_sucesso %}
            <div class="mt-4 text-green-600 text-sm">
                {{ mensagem_sucesso }}
            </div>
            {% endif %}
        </form>
    </div>
</div>
