{# dir: seguranca_publica/templates/parcial/modal_busca_cpf.html #}
{% load static %}
<div id="modal-busca-cpf-wrapper" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
     onclick="if(event.target===this) this.remove()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-fade-in-up max-h-[90vh] overflow-y-auto">
        <form hx-post="{% url 'seguranca_publica:buscar_atendimentos_por_cpf_modal' %}"
              hx-target="#modal-busca-cpf-wrapper"
              hx-swap="outerHTML">
            {% csrf_token %}

            <!-- Cabeçalho -->
            <div class="flex items-center justify-between px-6 py-4 rounded-t-2xl bg-gradient-to-r from-green-600 to-green-400">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-search"></i> Buscar por CPF
                </h2>
                <button type="button" class="text-white hover:text-green-200 text-2xl font-bold transition"
                        onclick="document.getElementById('modal-busca-cpf-wrapper').remove()" aria-label="Fechar">
                    &times;
                </button>
            </div>

            <!-- Corpo -->
            <div class="px-6 py-6 bg-green-50">
                <div class="mb-4">
                    <label for="cpf" class="block text-sm font-medium text-green-700 mb-2">
                        <i class="fas fa-id-card mr-1"></i> CPF do Agressor
                    </label>
                    <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14"
                           class="w-full px-4 py-3 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors"
                           required>
                </div>

                <!-- Resultado da busca -->
                <div id="resultado-busca" class="mb-4">
                    {{ resultado|safe }}
                </div>
            </div>

            <!-- Rodapé -->
            <div class="flex justify-end gap-2 px-6 py-4 rounded-b-2xl bg-gradient-to-r from-green-600 to-green-400">
                <button type="button"
                        class="px-4 py-2 rounded-lg bg-green-100 text-green-700 font-semibold hover:bg-green-200 transition"
                        onclick="document.getElementById('modal-busca-cpf-wrapper').remove()">Cancelar</button>
                <button type="submit"
                        class="px-4 py-2 rounded-lg bg-green-600 text-white font-semibold hover:bg-green-700 transition">
                    <i class="fas fa-search mr-1"></i> Buscar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Máscara para CPF
    document.getElementById('cpf').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        value = value.replace(/(\d{3})(\d)/, '$1.$2');
        value = value.replace(/(\d{3})(\d)/, '$1.$2');
        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = value;
    });

    // Fechar com ESC
    document.addEventListener('keydown', function fechaModalCpf(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('modal-busca-cpf-wrapper');
            if (modal) {
                modal.remove();
                document.removeEventListener('keydown', fechaModalCpf);
            }
        }
    });
</script>
