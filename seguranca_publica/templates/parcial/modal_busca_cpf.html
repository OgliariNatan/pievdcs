<div id="modal-busca-cpf" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
    hx-on="click: if(event.target.id==='modal-busca-cpf'){this.remove()}">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 animate-fade-in-up" hx-target="#modal-busca-cpf"
        hx-swap="outerHTML">
        <form id="form-busca-cpf" class="p-6" hx-post="{% url 'seguranca_publica:buscar_atendimentos_por_cpf' %}"
            hx-target="#modal-busca-cpf" hx-swap="outerHTML">
            <h2 class="text-xl font-bold text-purple-700 mb-4 flex items-center gap-2">
                <i class="fas fa-search"></i> Consultar Atendimentos por CPF
            </h2>
            <label for="input-cpf" class="block text-sm font-medium text-purple-700 mb-2">CPF</label>
            <input type="text" id="input-cpf" name="cpf" maxlength="14" placeholder="Digite o CPF"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all duration-200 mb-4"
                required>
            <div class="flex justify-end gap-2">
                <button type="button"
                    class="px-4 py-2 rounded-lg bg-purple-100 text-purple-700 font-semibold hover:bg-purple-200 transition"
                    onclick="document.getElementById('modal-busca-cpf').remove()">Cancelar</button>
                <button type="submit"
                    class="px-4 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition">
                    Consultar
                </button>
            </div>
            {% if resultado is not None %}
            <div class="mt-4 text-sm">
                {{ resultado|safe }}
            </div>
            {% endif %}
        </form>
    </div>
</div>
