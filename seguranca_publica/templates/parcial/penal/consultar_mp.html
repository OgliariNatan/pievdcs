<!-- seguranca_publica/templates/parcial/penal/consultar_mp.html -->

<div id="modal-consultar-mp"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-2 sm:p-4"
     onclick="if(event.target===this) this.remove()">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl animate-fade-in-up max-h-[95vh] sm:max-h-[90vh] overflow-hidden flex flex-col"
         onclick="event.stopPropagation()">

        <!-- Cabeçalho -->
        <div class="bg-gradient-to-r from-rose-300 to-pink-500 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-2 sm:gap-3">
                <i class="fa-solid fa-scale-unbalanced-flip text-white text-lg sm:text-xl"></i>
                <h2 class="text-white text-base sm:text-lg font-bold">Consulta de Medidas Protetivas</h2>
            </div>
            <button onclick="document.getElementById('modal-consultar-mp').remove()"
                    class="text-white/80 hover:text-white transition-colors text-2xl leading-none">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Filtros -->
        <div class="px-4 sm:px-6 py-3 sm:py-4 bg-pink-50 border-b border-pink-200 flex-shrink-0">
            <form hx-get="{% url 'seguranca_publica:consultar_mp_penal' %}"
                  hx-target="#tabela-mp-penal"
                  hx-swap="innerHTML"
                  class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 items-end">
                <div>
                    <label class="block text-xs font-semibold text-pink-700 mb-1">Status</label>
                    <select name="status"
                            class="w-full rounded-lg border border-pink-300 text-sm px-3 py-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
                        <option value="todas" {% if filtro_status == 'todas' %}selected{% endif %}>Todas</option>
                        <option value="ativas" {% if filtro_status == 'ativas' %}selected{% endif %}>Ativas</option>
                        <option value="vencidas" {% if filtro_status == 'vencidas' %}selected{% endif %}>Vencidas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-pink-700 mb-1">Comarca</label>
                    <select name="comarca"
                            class="w-full rounded-lg border border-pink-300 text-sm px-3 py-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
                        <option value="">Todas</option>
                        {% for comarca in comarcas %}
                        <option value="{{ comarca.id }}" {% if filtro_comarca == comarca.id|stringformat:"d" %}selected{% endif %}>
                            {{ comarca.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-pink-700 mb-1">Ordenar por</label>
                    <select name="ordenar"
                            class="w-full rounded-lg border border-pink-300 text-sm px-3 py-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
                        <option value="periodo_mp" {% if filtro_ordenar == 'periodo_mp' %}selected{% endif %}>Vencimento ↑</option>
                        <option value="-periodo_mp" {% if filtro_ordenar == '-periodo_mp' %}selected{% endif %}>Vencimento ↓</option>
                        <option value="-data_solicitacao" {% if filtro_ordenar == '-data_solicitacao' %}selected{% endif %}>Mais recentes</option>
                    </select>
                </div>
                <div class="col-span-2 sm:col-span-2 lg:col-span-2">
                    <label class="block text-xs font-semibold text-pink-700 mb-1">Buscar (vítima ou autor(a))</label>
                    <input type="text" name="busca" value="{{ filtro_busca }}"
                           placeholder="Nome ou CPF..."
                           class="w-full rounded-lg border border-pink-300 text-sm px-3 py-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
                </div>
                <div>
                    <button type="submit"
                            class="w-full bg-pink-600 hover:bg-pink-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
                        <i class="fas fa-filter mr-1"></i> Filtrar
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabela de resultados -->
        <div id="tabela-mp-penal" class="overflow-auto flex-1 min-h-0">
            {% include "parcial/penal/tabela_mp_penal.html" %}
        </div>
    </div>
</div>

<!-- Fechar com ESC -->
<script>
    (function() {
        function fecharModalMP(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal-consultar-mp');
                if (modal) modal.remove();
                document.removeEventListener('keydown', fecharModalMP);
            }
        }
        document.addEventListener('keydown', fecharModalMP);
    })();
</script>
