{# seguranca_publica/templates/parcial/penal/relatorio_por_cpf_popup.html #}
{% load static %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
     id="popup-relatorio-cpf"
     onclick="if(event.target===this) this.remove()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-fade-in-up max-h-[90vh] overflow-y-auto">
        <!-- O form abre em nova aba para o PDF -->
        <form method="get"
              action="{% url 'seguranca_publica:gerar_relatorio_por_cpf' %}"
              target="_blank">

            <!-- Cabeçalho -->
            <div class="flex items-center justify-between px-6 py-4 rounded-t-2xl bg-gradient-to-r from-green-600 to-green-400">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-file-pdf"></i> Relatório por CPF ou Nome
                </h2>
                <button type="button"
                        class="text-white hover:text-green-200 text-2xl font-bold transition"
                        onclick="document.getElementById('popup-relatorio-cpf').remove()"
                        aria-label="Fechar">
                    &times;
                </button>
            </div>

            <!-- Corpo -->
            <div class="px-6 py-6 bg-green-50">
                <div class="mb-4">
                    <label for="busca" class="block text-sm font-medium text-green-700 mb-2">
                        <i class="fas fa-id-card mr-1"></i> CPF ou nome do(a) autor(a) da violência 
                    </label>
                    <input type="text" name="busca" id="busca"
                           placeholder="Digite o CPF (000.000.000-00) ou o nome"
                           class="w-full px-4 py-3 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors"
                           required>
                    <p class="text-xs text-green-600 mt-1">
                        <i class="fas fa-info-circle mr-1"></i>
                        Informe o CPF completo ou parte do nome para buscar.
                    </p>
                </div>
            </div>

            <!-- Rodapé -->
            <div class="flex justify-end gap-2 px-6 py-4 rounded-b-2xl bg-gradient-to-r from-green-600 to-green-400">
                <button type="button"
                        class="px-4 py-2 rounded-lg bg-green-100 text-green-700 font-semibold hover:bg-green-200 transition"
                        onclick="document.getElementById('popup-relatorio-cpf').remove()">
                    Cancelar
                </button>
                <button type="submit"
                        class="px-4 py-2 rounded-lg bg-green-600 text-white font-semibold hover:bg-green-700 transition">
                    <i class="fas fa-file-pdf mr-1"></i> Gerar PDF
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    /* Fecha com ESC */
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') {
            const popup = document.getElementById('popup-relatorio-cpf');
            if (popup) popup.remove();
            document.removeEventListener('keydown', handler);
        }
    });

    /* Máscara de CPF automática (ativa quando digita só números) */
    document.getElementById('busca').addEventListener('input', function (e) {
        let val = e.target.value;
        let soNumeros = val.replace(/\D/g, '');
        /* Aplica máscara somente se o usuário digitou apenas números */
        if (soNumeros.length === val.replace(/[.\-]/g, '').length && soNumeros.length > 0) {
            if (soNumeros.length > 11) soNumeros = soNumeros.slice(0, 11);
            if (soNumeros.length > 9) {
                val = soNumeros.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
            } else if (soNumeros.length > 6) {
                val = soNumeros.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            } else if (soNumeros.length > 3) {
                val = soNumeros.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            }
            e.target.value = val;
        }
    });
</script>
