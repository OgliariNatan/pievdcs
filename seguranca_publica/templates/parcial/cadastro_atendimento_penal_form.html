{% load static %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl mx-4 animate-fade-in-up max-h-[90vh] overflow-y-auto">
        <form hx-post="{% url 'seguranca_publica:cadastro_atendimento_penal_submit' %}"
            hx-target="#modal-atendimento-penal" hx-swap="innerHTML">
            {% csrf_token %}
            <!-- Cabeçalho -->
            <div
                class="flex items-center justify-between px-6 py-4 rounded-t-2xl bg-gradient-to-r from-purple-600 to-purple-400">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-hand-holding-heart"></i> Cadastrar Atendimento
                </h2>
                <button type="button" class="text-white hover:text-purple-200 text-2xl font-bold transition"
                    onclick="document.getElementById('modal-atendimento-penal').innerHTML = ''" aria-label="Fechar">
                    &times;
                </button>
            </div>
            <!-- Corpo -->
            <div class="px-6 py-6 bg-purple-50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Data do Atendimento -->
                    <div>
                        <label for="{{ form.data_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-calendar mr-1"></i>
                            Data e Hora do Atendimento
                        </label>
                        {{ form.data_atendimento }}
                    </div>

                    <!-- Tempo de Atendimento -->
                    <div>
                        <label for="{{ form.tempo_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-clock mr-1"></i>
                            Duração do Atendimento
                        </label>
                        {{ form.tempo_atendimento }}
                    </div>

                    <!-- Setor de Atendimento -->
                    <div>
                        <label for="{{ form.setor_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-users mr-1"></i>
                            Setor de Atendimento
                        </label>
                        {{ form.setor_atendimento }}
                    </div>

                    <!-- Tipo de Atendimento -->
                    <div>
                        <label for="{{ form.atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-clipboard-list mr-1"></i>
                            Tipo de Atendimento
                        </label>
                        <div class="flex gap-2 items-center">
                            {{ form.atendimento }}
                            <button type="button"
                                class="inline-flex items-center justify-center bg-purple-600 hover:bg-purple-500 text-white rounded-full w-8 h-8 transition"
                                hx-get="{% url 'seguranca_publica:cadastro_tipo_atendimento_form' %}"
                                hx-target="#modal-tipo-atendimento" hx-trigger="click" hx-swap="innerHTML"
                                title="Adicionar tipo de atendimento">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Campo Teste -->
                    <div class="md:col-span-2 flex items-center gap-2 mt-2">
                        {{ form.teste }}
                        <label for="{{ form.teste.id_for_label }}" class="text-sm font-medium text-purple-700">
                            Marcar como Teste
                        </label>
                    </div>
                    <!-- Agressores Atendidos -->
                    <div class="md:col-span-2">
                        <label for="{{ form.agressores_atendidos.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-user-friends mr-1"></i>
                            Participantes do Atendimento
                        </label>
                        <div class="border border-gray-300 rounded-xl p-4 max-h-48 overflow-y-auto bg-white">
                            {{ form.agressores_atendidos }}
                        </div>
                        <p class="text-xs text-gray-600 mt-1">Marque os participantes do atendimento</p>
                    </div>

                    <!-- Avaliação -->
                    <div class="md:col-span-2">
                        <label for="{{ form.avaliacao.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-comment-dots mr-1"></i>
                            Descrição do Atendimento
                        </label>
                        <div class="flex gap-2 items-start">
                            {{ form.avaliacao }}
                            <button type="button" id="btn-gravar-audio"
                                class="flex items-center px-3 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition"
                                title="Gravar áudio para transcrever">
                                <i class="fas fa-microphone"></i>
                            </button>
                        </div>
                        <small id="audio-status" class="block text-xs text-gray-500 mt-1"></small>
                    </div>
                </div>
            </div>
            <!-- Rodapé -->
            <div class="flex justify-end gap-2 px-6 py-4 rounded-b-2xl bg-gradient-to-r from-purple-600 to-purple-400">
                <button type="button"
                    class="px-4 py-2 rounded-lg bg-purple-100 text-purple-700 font-semibold hover:bg-purple-200 transition"
                    onclick="this.closest('.fixed').remove()">Cancelar
                </button>
                <button type="submit"
                    class="px-4 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition">
                    <i class="fas fa-save mr-1"></i>
                    Salvar Atendimento
                </button>
            </div>
        </form>
    </div>
    <div id="modal-tipo-atendimento"></div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in-up {
        animation: fadeInUp 0.4s cubic-bezier(.4, 2, .6, 1) both;
    }
</style>


<script>
    // Função para criar uma interface de seleção melhorada
    function melhorarSelectMultiplo() {
        const select = document.querySelector('select[name="agressores_atendidos"]');
        if (!select) return;

        // Container personalizado
        const container = document.createElement('div');
        container.className = 'space-y-2';

        // Barra de pesquisa
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.placeholder = 'Pesquisar participantes...';
        searchInput.className = 'w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500';

        // Lista de opções
        const optionsList = document.createElement('div');
        optionsList.className = 'max-h-40 overflow-y-auto border border-gray-200 rounded-lg p-2 space-y-1';

        // Criar checkboxes para cada opção
        Array.from(select.options).forEach(option => {
            const label = document.createElement('label');
            label.className = 'flex items-center gap-2 p-2 hover:bg-purple-50 rounded cursor-pointer';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = option.value;
            checkbox.checked = option.selected;
            checkbox.className = 'form-checkbox h-4 w-4 text-purple-600';

            const text = document.createElement('span');
            text.textContent = option.text;
            text.className = 'text-sm text-gray-700';

            label.appendChild(checkbox);
            label.appendChild(text);
            optionsList.appendChild(label);

            // Sincronizar com o select original
            checkbox.addEventListener('change', function () {
                option.selected = this.checked;
            });
        });

        // Função de pesquisa
        searchInput.addEventListener('input', function () {
            const searchTerm = this.value.toLowerCase();
            const labels = optionsList.querySelectorAll('label');

            labels.forEach(label => {
                const text = label.textContent.toLowerCase();
                label.style.display = text.includes(searchTerm) ? 'flex' : 'none';
            });
        });

        // Montar interface
        container.appendChild(searchInput);
        container.appendChild(optionsList);

        // Substituir o select original
        select.style.display = 'none';
        select.parentNode.insertBefore(container, select);
    }

    // Aplicar quando o modal for carregado
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.target.id === 'modal-atendimento-penal') {
            melhorarSelectMultiplo();
        }
    });

    // Aplicar no carregamento inicial
    document.addEventListener('DOMContentLoaded', melhorarSelectMultiplo);


    // Reconhecimento de voz para transcrição de áudio
    document.addEventListener('DOMContentLoaded', function () {
        const btnGravar = document.getElementById('btn-gravar-audio');
        const textarea = document.getElementById('id_avaliacao');
        const status = document.getElementById('audio-status');
        let recognition;
        let gravando = false;

        if (btnGravar && textarea && 'webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = function () {
                gravando = true;
                status.textContent = 'Gravando... Fale agora.';
                btnGravar.classList.add('bg-red-600');
            };

            recognition.onend = function () {
                gravando = false;
                status.textContent = '';
                btnGravar.classList.remove('bg-red-600');
            };

            recognition.onerror = function (event) {
                gravando = false;
                status.textContent = 'Erro ao capturar áudio.';
                btnGravar.classList.remove('bg-red-600');
            };

            recognition.onresult = function (event) {
                if (event.results.length > 0) {
                    const texto = event.results[0][0].transcript;
                    textarea.value += (textarea.value ? ' ' : '') + texto;
                }
            };

            btnGravar.addEventListener('click', function () {
                if (!gravando) {
                    recognition.start();
                } else {
                    recognition.stop();
                }
            });
        } else if (btnGravar) {
            btnGravar.disabled = true;
            status.textContent = 'Seu navegador não suporta gravação de voz.';
        }
    });
</script>
