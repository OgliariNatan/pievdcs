{% load static %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl mx-4 animate-fade-in-up max-h-[90vh] overflow-y-auto">
        <form hx-post="{% url 'seguranca_publica:cadastro_atendimento_penal_submit' %}"
            hx-target="#modal-atendimento-penal" hx-swap="innerHTML">
            {% csrf_token %}
            <!-- Cabeçalho -->
            <div
                class="flex items-center justify-between px-6 py-4 rounded-t-2xl bg-gradient-to-r from-purple-600 to-purple-400">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-hand-holding-heart"></i> Cadastrar Atendimento
                </h2>
                <button type="button" class="text-white hover:text-purple-200 text-2xl font-bold transition"
                    onclick="this.closest('.fixed').remove()" aria-label="Fechar">
                    &times;
                </button>
            </div>
            <!-- Corpo -->
            <div class="px-6 py-6 bg-purple-50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Data do Atendimento -->
                    <div>
                        <label for="{{ form.data_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-calendar mr-1"></i>
                            Data e Hora do Atendimento
                        </label>
                        {{ form.data_atendimento }}
                    </div>

                    <!-- Tempo de Atendimento -->
                    <div>
                        <label for="{{ form.tempo_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-clock mr-1"></i>
                            Duração do Atendimento
                        </label>
                        {{ form.tempo_atendimento }}
                    </div>

                    <!-- Setor de Atendimento -->
                    <div>
                        <label for="{{ form.setor_atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-users mr-1"></i>
                            Setor de Atendimento
                        </label>
                        {{ form.setor_atendimento }}
                    </div>

                    <!-- Tipo de Atendimento -->
                    <div>
                        <label for="{{ form.atendimento.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-clipboard-list mr-1"></i>
                            Tipo de Atendimento
                        </label>
                        <div class="flex gap-2 items-center">
                            {{ form.atendimento }}
                            <button type="button"
                                class="inline-flex items-center justify-center bg-purple-600 hover:bg-purple-500 text-white rounded-full w-8 h-8 transition"
                                hx-get="{% url 'seguranca_publica:cadastro_tipo_atendimento_form' %}"
                                hx-target="#modal-tipo-atendimento" hx-trigger="click" hx-swap="innerHTML"
                                title="Adicionar tipo de atendimento">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Agressores Atendidos -->
                    <div class="md:col-span-2">
                        <label for="{{ form.agressores_atendidos.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-user-friends mr-1"></i>
                            Participantes do Atendimento
                        </label>
                        {{ form.agressores_atendidos }}
                        <p class="text-xs text-gray-600 mt-1">Segure Ctrl para selecionar múltiplos participantes</p>
                    </div>

                    <!-- Avaliação -->
                    <div class="md:col-span-2">
                        <label for="{{ form.avaliacao.id_for_label }}"
                            class="block text-sm font-medium text-purple-700 mb-2">
                            <i class="fas fa-comment-dots mr-1"></i>
                            Descrição do Atendimento
                        </label>
                        {{ form.avaliacao }}
                    </div>
                </div>
            </div>
            <!-- Rodapé -->
            <div class="flex justify-end gap-2 px-6 py-4 rounded-b-2xl bg-gradient-to-r from-purple-600 to-purple-400">
                <button type="button"
                    class="px-4 py-2 rounded-lg bg-purple-100 text-purple-700 font-semibold hover:bg-purple-200 transition"
                    onclick="this.closest('.fixed').remove()">Cancelar
                </button>
                <button type="submit"
                    class="px-4 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition">
                    <i class="fas fa-save mr-1"></i>
                    Salvar Atendimento
                </button>
            </div>
        </form>
    </div>
    <div id="modal-tipo-atendimento"></div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in-up {
        animation: fadeInUp 0.4s cubic-bezier(.4, 2, .6, 1) both;
    }
</style>
