<!-- sistema_justica/templates/parcial/judiciario/listar_medidas_protetivas.html -->

<div id="modal-medidas-protetivas"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     onclick="if(event.target===this) this.remove()">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl mx-4 animate-fade-in-up max-h-[90vh] overflow-hidden"
         onclick="event.stopPropagation()">

        <!-- Cabeçalho -->
        <div class="bg-gradient-to-r from-yellow-700 to-orange-400 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-gavel text-white text-xl"></i>
                <h2 class="text-white text-lg font-bold">Acompanhamento de Medidas Protetivas</h2>
            </div>
            <button onclick="document.getElementById('modal-medidas-protetivas').remove()"
                    class="text-white/80 hover:text-white transition-colors text-2xl leading-none">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Filtros -->
        <div class="px-6 py-4 bg-orange-50 border-b border-orange-200">
            <form hx-get="{% url 'sistema_justica:listar_medidas_protetivas' %}"
                  hx-target="#tabela-medidas"
                  hx-swap="innerHTML"
                  class="flex flex-wrap items-end gap-4">
                <div>
                    <label class="block text-xs font-semibold text-orange-700 mb-1">Status</label>
                    <select name="status"
                            class="rounded-lg border border-orange-300 text-sm px-3 py-2 focus:ring-2 focus:ring-orange-400 focus:outline-none">
                        <option value="todas" {% if filtro_status == 'todas' %}selected{% endif %}>Todas</option>
                        <option value="ativas" {% if filtro_status == 'ativas' %}selected{% endif %}>Ativas</option>
                        <option value="vencidas" {% if filtro_status == 'vencidas' %}selected{% endif %}>Vencidas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-orange-700 mb-1">Ordenar por</label>
                    <select name="ordenar"
                            class="rounded-lg border border-orange-300 text-sm px-3 py-2 focus:ring-2 focus:ring-orange-400 focus:outline-none">
                        <option value="periodo_mp" {% if filtro_ordenar == 'periodo_mp' %}selected{% endif %}>Vencimento (crescente)</option>
                        <option value="-periodo_mp" {% if filtro_ordenar == '-periodo_mp' %}selected{% endif %}>Vencimento (decrescente)</option>
                        <option value="-data_solicitacao" {% if filtro_ordenar == '-data_solicitacao' %}selected{% endif %}>Mais recentes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-orange-700 mb-1">Buscar vítima</label>
                    <input type="text" name="busca" value="{{ filtro_busca }}"
                           placeholder="Nome ou CPF..."
                           class="rounded-lg border border-orange-300 text-sm px-3 py-2 focus:ring-2 focus:ring-orange-400 focus:outline-none w-48">
                </div>
                <button type="submit"
                        class="bg-orange-600 hover:bg-orange-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
                    <i class="fas fa-filter mr-1"></i> Filtrar
                </button>
            </form>
        </div>

        <!-- Tabela de resultados -->
        <div id="tabela-medidas" class="overflow-y-auto max-h-[calc(90vh-220px)]">
            {% include "parcial/judiciario/tabela_medidas_protetivas.html" %}
        </div>
    </div>
</div>

<!-- Fechar com ESC -->
<script>
    (function() {
        function fecharModalMP(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal-medidas-protetivas');
                if (modal) modal.remove();
                document.removeEventListener('keydown', fecharModalMP);
            }
        }
        document.addEventListener('keydown', fecharModalMP);
    })();
</script>
