<!-- sistema_justica/templates/parcial/judiciario/listar_grupos_reflexivos.html -->

<div id="modal-grupos-reflexivos"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-2 sm:p-4"
     onclick="if(event.target===this) this.remove()">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl animate-fade-in-up max-h-[95vh] sm:max-h-[90vh] overflow-hidden flex flex-col"
         onclick="event.stopPropagation()">

        <!-- Cabeçalho -->
        <div class="bg-gradient-to-r from-sky-700 to-blue-400 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-2 sm:gap-3">
                <i class="fas fa-people-group text-white text-lg sm:text-xl"></i>
                <h2 class="text-white text-base sm:text-lg font-bold">Atendimentos dos Agressores — Grupos Reflexivos</h2>
            </div>
            <button onclick="document.getElementById('modal-grupos-reflexivos').remove()"
                    class="text-white/80 hover:text-white transition-colors text-2xl leading-none">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Filtros -->
        <div class="px-4 sm:px-6 py-3 sm:py-4 bg-sky-50 border-b border-sky-200 flex-shrink-0">
            <form hx-get="{% url 'sistema_justica:listar_grupos_reflexivos' %}"
                  hx-target="#tabela-grupos-reflexivos"
                  hx-swap="innerHTML"
                  class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 items-end">
                <div>
                    <label class="block text-xs font-semibold text-sky-700 mb-1">Setor</label>
                    <select name="setor"
                            class="w-full rounded-lg border border-sky-300 text-sm px-3 py-2 focus:ring-2 focus:ring-sky-400 focus:outline-none">
                        <option value="" {% if not filtro_setor %}selected{% endif %}>Todos</option>
                        <option value="Assistente Social" {% if filtro_setor == 'Assistente Social' %}selected{% endif %}>Assistente Social</option>
                        <option value="Psicóloga" {% if filtro_setor == 'Psicóloga' %}selected{% endif %}>Psicóloga</option>
                        <option value="Enfermagem" {% if filtro_setor == 'Enfermagem' %}selected{% endif %}>Enfermagem</option>
                        <option value="Grupo refletivo" {% if filtro_setor == 'Grupo refletivo' %}selected{% endif %}>Grupo Reflexivo</option>
                        <option value="Outros" {% if filtro_setor == 'Outros' %}selected{% endif %}>Outros</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-sky-700 mb-1">Ordenar por</label>
                    <select name="ordenar"
                            class="w-full rounded-lg border border-sky-300 text-sm px-3 py-2 focus:ring-2 focus:ring-sky-400 focus:outline-none">
                        <option value="-data_atendimento" {% if filtro_ordenar == '-data_atendimento' %}selected{% endif %}>Mais recentes</option>
                        <option value="data_atendimento" {% if filtro_ordenar == 'data_atendimento' %}selected{% endif %}>Mais antigos</option>
                    </select>
                </div>
                <div class="col-span-2 sm:col-span-1 lg:col-span-2">
                    <label class="block text-xs font-semibold text-sky-700 mb-1">Buscar participante</label>
                    <input type="text" name="busca" value="{{ filtro_busca }}"
                           placeholder="Nome ou CPF do agressor..."
                           class="w-full rounded-lg border border-sky-300 text-sm px-3 py-2 focus:ring-2 focus:ring-sky-400 focus:outline-none">
                </div>
                <div>
                    <button type="submit"
                            class="w-full bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
                        <i class="fas fa-filter mr-1"></i> Filtrar
                    </button>
                </div>
            </form>
        </div>

        <!-- Estatísticas rápidas -->
        <div class="px-4 sm:px-6 py-3 bg-white border-b border-gray-100 flex-shrink-0">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div class="bg-sky-50 rounded-lg p-3 text-center">
                    <p class="text-2xl font-bold text-sky-700">{{ total_grupos }}</p>
                    <p class="text-xs text-sky-600">Total de Atendimentos</p>
                </div>
                <div class="bg-blue-50 rounded-lg p-3 text-center">
                    <p class="text-2xl font-bold text-blue-700">{{ total_grupos_mes }}</p>
                    <p class="text-xs text-blue-600">Este Mês</p>
                </div>
                <div class="bg-indigo-50 rounded-lg p-3 text-center">
                    <p class="text-2xl font-bold text-indigo-700">{{ total_agressores }}</p>
                    <p class="text-xs text-indigo-600">Participações Totais</p>
                </div>
                <div class="bg-purple-50 rounded-lg p-3 text-center">
                    <p class="text-2xl font-bold text-purple-700">{{ total_agressores_unicos }}</p>
                    <p class="text-xs text-purple-600">Agressores Únicos</p>
                </div>
            </div>
        </div>

        <!-- Tabela de atendimentos -->
        <div id="tabela-grupos-reflexivos" class="overflow-auto flex-1 min-h-0">
            {% include "parcial/judiciario/tabela_grupos_reflexivos.html" %}
        </div>
    </div>
</div>

<!-- Fechar com ESC -->
<script>
    (function() {
        function fecharModalGR(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal-grupos-reflexivos');
                if (modal) modal.remove();
                document.removeEventListener('keydown', fecharModalGR);
            }
        }
        document.addEventListener('keydown', fecharModalGR);
    })();
</script>
