{# municipio/templates/parcial/modal_busca_cpf.html #}
{% load static %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
     onclick="if(event.target===this) document.getElementById('modal-consulta-cpf').innerHTML = ''">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto"
         onclick="event.stopPropagation()">
        <form hx-post="{% url 'municipio:buscar_atendimentos_creas_modal' %}"
              hx-target="#modal-consulta-cpf" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="flex items-center justify-between px-6 py-4 rounded-t-2xl bg-gradient-to-r from-green-600 to-green-400">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-search"></i> Buscar por CPF — {{ instituicao }}
                </h2>
                <button type="button" class="text-white hover:text-green-200 text-2xl font-bold transition"
                        onclick="document.getElementById('modal-consulta-cpf').innerHTML = ''">&times;</button>
            </div>
            <div class="px-6 py-6 bg-green-50">
                <div class="mb-4">
                    <label for="cpf" class="block text-sm font-medium text-green-700 mb-2">
                        <i class="fas fa-id-card mr-1"></i> CPF
                    </label>
                    <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14"
                           class="w-full px-4 py-3 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-500" required>
                </div>
                <div id="resultado-busca" class="mb-4">{{ resultado|safe }}</div>
            </div>
            <div class="flex justify-end gap-2 px-6 py-4 rounded-b-2xl bg-gradient-to-r from-green-600 to-green-400">
                <button type="button" class="px-4 py-2 rounded-lg bg-green-100 text-green-700 font-semibold hover:bg-green-200 transition"
                        onclick="document.getElementById('modal-consulta-cpf').innerHTML = ''">Cancelar</button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-green-600 text-white font-semibold hover:bg-green-700 transition">
                    <i class="fas fa-search mr-1"></i> Buscar
                </button>
            </div>
        </form>
    </div>
</div>
<script>
    document.getElementById('cpf').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = v;
    });
</script>
