{# dir: usuarios/templates/_membros_grupo.html #}
<div id="membros-grupo-{{ grupo.pk }}" class="divide-y divide-gray-100">
    {% for membro in grupo.user_set.all %}
    <div class="flex items-center justify-between px-4 py-3">
        <div>
            <p class="font-medium text-gray-800 text-sm">
                {{ membro.get_full_name|default:membro.username }}
            </p>
            <p class="text-xs text-gray-400">
                {{ membro.username }}{% if membro.cpf %} · {{ membro.cpf }}{% endif %}
            </p>
        </div>
        <button
            class="px-3 py-1 text-xs bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition"
            hx-post="{% url 'usuarios:config_conta_gestao_remover' %}"
            hx-vals='{"grupo_id": "{{ grupo.pk }}", "usuario_id": "{{ membro.pk }}"}'
            hx-target="#membros-grupo-{{ grupo.pk }}"
            hx-swap="outerHTML"
            hx-confirm="Remover {{ membro.get_full_name|default:membro.username }} de {{ grupo.name }}?"
            {% if membro.pk == request.user.pk %}disabled title="Você não pode se remover"{% endif %}>
            <i class="fas fa-user-minus mr-1"></i>Remover
        </button>
    </div>
    {% empty %}
    <p class="text-gray-400 px-4 py-3 text-sm italic">Nenhum membro neste setor.</p>
    {% endfor %}
</div>
