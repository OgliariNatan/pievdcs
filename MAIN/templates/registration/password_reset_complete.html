{# MAIN/templates/registration/password_reset_complete.html #}
{% extends 'base/base.html' %}
{% block titulo %}Senha Redefinida{% endblock %}

{% block main_content %}
<div class="min-h-screen bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 flex items-center justify-center px-4 py-8">
    <div class="relative w-full max-w-md">
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20 overflow-hidden">
            <div class="bg-gradient-to-r from-green-500 to-teal-500 p-8 text-center">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30">
                    <i class="fas fa-check-circle text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white mb-2">Senha Redefinida!</h1>
                <p class="text-white/80 text-sm">Sua senha foi alterada com sucesso</p>
            </div>
            <div class="p-8 text-center space-y-4">
                <p class="text-gray-700">Agora você pode fazer login com sua nova senha.</p>
                <a href="{% url 'login' %}"
                    class="inline-block mt-4 bg-gradient-to-r from-primary to-secondary text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 hover:scale-[1.02]">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Fazer login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
