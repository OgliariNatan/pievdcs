{% extends 'base/base.html' %}
{% block content %}
<h2>Recuperar Senha</h2>
<p>Digite o nome de usuário ou e-mail associado à sua conta. Você receberá um link para redefinir sua senha.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enviar</button>
</form>
{% endblock %}
