{% extends 'base/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-page">
    <div class="logo-container">
        <h1>Logo Aqui</h1>
    </div>
    <div class="login-container">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-button">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
