{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/relatorios_style.css' %}">

<div class="dashboard">
    <h1>Dashboard de Relatórios</h1>

    <!-- Gráfico de Pizza: Cidades -->
    <div class="chart-container">
        <h2>Distribuição por Cidades</h2>
        <canvas id="cidadeChart"></canvas>
    </div>

    <!-- Gráfico de Barras: Idade -->
    <div class="chart-container">
        <h2>Distribuição por Idade</h2>
        <canvas id="idadeChart"></canvas>
    </div>

    <!-- Gráfico de Barras: Etnia -->
    <div class="chart-container">
        <h2>Distribuição por Etnia</h2>
        <canvas id="etniaChart"></canvas>
    </div>
</div>

<!-- Script do Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Dados passados pelo Django
    const cidades = {{ cidades| safe }};
    const idades = {{ idades| safe }};
    const etnias = {{ etnias| safe }};

    // Gráfico de Pizza: Cidades
    const cidadeCtx = document.getElementById('cidadeChart').getContext('2d');
    new Chart(cidadeCtx, {
        type: 'pie',
        data: {
            labels: cidades.labels,
            datasets: [{
                label: 'Distribuição por Cidades',
                data: cidades.data,
                backgroundColor: ['#c8a2c8', '#e6cce6', '#f3e6f3', '#5a3d5a']
            }]
        }
    });

    // Gráfico de Barras: Idade
    const idadeCtx = document.getElementById('idadeChart').getContext('2d');
    new Chart(idadeCtx, {
        type: 'bar',
        data: {
            labels: idades.labels,
            datasets: [{
                label: 'Distribuição por Idade',
                data: idades.data,
                backgroundColor: ['#c8a2c8', '#e6cce6', '#f3e6f3', '#5a3d5a']
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    // Gráfico de Barras: Etnia
    const etniaCtx = document.getElementById('etniaChart').getContext('2d');
    new Chart(etniaCtx, {
        type: 'bar',
        data: {
            labels: etnias.labels,
            datasets: [{
                label: 'Distribuição por Etnia',
                data: etnias.data,
                backgroundColor: ['#c8a2c8', '#e6cce6', '#f3e6f3', '#5a3d5a']
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
{% endblock %}
