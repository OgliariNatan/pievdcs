{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    {% block head %}{% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="PIEVDCS - Plataforma Integrada de Enfrentamento à Violência Doméstica e Crimes Sexuais. Sistema integrado para forças de segurança pública, sistema de justiça e serviços municipais no combate à violência doméstica e crimes sexuais no Brasil.">
    <meta name="keywords" content="violência doméstica, crimes sexuais, PIEVDCS, segurança pública, sistema justiça, apoio vítimas, denúncia violência, polícia civil, polícia militar, ministério público, defensoria pública, poder judiciário, CRAS, CAPS, enfrentamento violência">
    <meta property="og:title" content="PIEVDCS - Plataforma Integrada de Enfrentamento à Violência Doméstica e Crimes Sexuais">
    <meta property="og:description" content="Sistema integrado para forças de segurança pública, sistema de justiça e serviços municipais no combate à violência doméstica e crimes sexuais no Brasil.">
    <meta property="og:image" content="{% static 'img/logo-enfrentamento-a-violencia-de-genero.png' %}">
    <meta property="og:locale" content="pt_BR">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="bingbot" content="noindex, nofollow">
    <meta name="theme-color" content="#B19CD9">
    <meta name="author" content="OgliariNatan">
    <link rel="icon" href="{% static 'img/logo-enfrentamento-a-violencia-de-genero.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/logo-enfrentamento-a-violencia-de-genero.png' %}">
    <link rel="shortcut icon" href="{% static 'img/logo-enfrentamento-a-violencia-de-genero.png' %}">
    <title>{% block titulo %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/cabecalho_rodape.css' %}">
    <link rel="stylesheet" href="{% static 'css/login_style.css' %}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- Cabeçalho, implementado no header -->
    {% include 'base/cabecalho.html' %}

    <!-- Conteúdo principal -->
    <nav class="top-nav">
        {% block nav %}{% endblock %}
    </nav>

    <main>
        {% block main_content %}
        {% endblock %}
    </main>

    <article>
        {% block article_content %}{% endblock %}
    </article>

    <!-- Rodapé, implementado no footer -->
    {% include 'base/rodape.html' %}

    {% block script %}{% endblock %}

    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Para smart-selects -->
    <script src="{% static 'smart-selects/admin/js/chainedfk.js' %}"></script>
    <script src="{% static 'smart-selects/admin/js/bindfields.js' %}"></script>
</body>

</html>
